<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xphinx-0 | Links</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117; /* GitHub Dark Theme */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid #30363d;
            margin-bottom: 10px;
        }

        h1 { font-size: 1.2rem; margin-bottom: 20px; }

        .links-container {
            width: 90%;
            max-width: 400px;
        }

        .link-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: block;
            transition: transform 0.2s, background 0.2s;
        }

        .link-card:hover {
            transform: scale(1.02);
            background: #21262d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>

    <img src="https://github.com/xphinx-0.png" alt="Profile Picture" class="profile-pic">
    
    <h1>@xphinx-0</h1>

    <div class="links-container">
        <a href="https://instagram.com/yourusername" class="link-card">Instagram</a>
        <a href="https://twitter.com/yourusername" class="link-card">Twitter / X</a>
        <a href="https://youtube.com/yourusername" class="link-card">YouTube</a>
        <a href="mailto:your@email.com" class="link-card">Contact Me</a>
    </div>

</body>
</html>
