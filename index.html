<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xphinx-0 | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Instrument+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Mode Variables */
            --bg: #ffffff;
            --text: #1a1a1a;
            --card-bg: #f5f5f7;
            --card-border: #e5e5e7;
            --accent: #007aff;
            --transition: 0.3s ease;
        }

        [data-theme="dark"] {
            /* Dark Mode Variables */
            --bg: #0d1117;
            --text: #f0f6fc;
            --card-bg: #161b22;
            --card-border: #30363d;
            --accent: #58a6ff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            transition: background-color var(--transition), color var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Instrument Sans', sans-serif;
            font-size: 1.5rem;
            margin: 0 0 5px 0;
        }

        p.bio {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .links-container {
            width: 100%;
            max-width: 450px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            display: block;
            transition: all var(--transition);
        }

        .link-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: var(--card-border);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="toggle">🌓 Switch Theme</button>

    <img src="https://github.com/xphinx-0.png" alt="Profile" class="profile-pic">
    
    <h1>xphinx-0</h1>
    <p class="bio">Developer & Creator</p>

    <div class="links-container">
        <a href="#" class="link-card">Portfolio</a>
        <a href="#" class="link-card">Latest Project</a>
        <a href="#" class="link-card">Instagram</a>
        <a href="#" class="link-card">YouTube</a>
    </div>

    <script>
        const btn = document.getElementById('toggle');
        const html = document.documentElement;

        // Check for saved user preference
        const savedTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        
        html.setAttribute('data-theme', savedTheme);

        btn.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
